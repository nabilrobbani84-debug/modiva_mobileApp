syntax = "proto3";

package auth.v1;

option go_package = "github.com/modiva/fintech-core-api/proto/auth/v1;authv1";

service AuthService {
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  string user_id = 1;
  string email = 2;
  string role = 3;
}
