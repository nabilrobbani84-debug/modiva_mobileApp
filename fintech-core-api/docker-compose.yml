services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: authdb
      MYSQL_USER: fintech
      MYSQL_PASSWORD: fintech
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql-data:/var/lib/mysql

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: txdb
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: fintech
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintech -d txdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  auth-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./services/auth/migrations/mysql:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=mysql://fintech:fintech@tcp(mysql:3306)/authdb",
        "up"
      ]
    restart: "no"

  transaction-migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/transaction/migrations/postgres:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://fintech:fintech@postgres:5432/txdb?sslmode=disable",
        "up"
      ]
    restart: "no"

  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    env_file: .env
    environment:
      MYSQL_DSN: fintech:fintech@tcp(mysql:3306)/authdb?parseTime=true
      AUTH_HTTP_ADDR: :8081
      AUTH_GRPC_ADDR: :9091
    depends_on:
      auth-migrate:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
      - "9091:9091"

  transaction-service:
    build:
      context: .
      dockerfile: services/transaction/Dockerfile
    env_file: .env
    environment:
      POSTGRES_DSN: postgres://fintech:fintech@postgres:5432/txdb?sslmode=disable
      TRANSACTION_HTTP_ADDR: :8082
      AUTH_GRPC_TARGET: auth-service:9091
    depends_on:
      transaction-migrate:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
    ports:
      - "8082:8082"

  dashboard:
    build:
      context: ./apps/dashboard
    environment:
      NEXT_PUBLIC_AUTH_API_URL: http://localhost:8081
      NEXT_PUBLIC_TRANSACTION_API_URL: http://localhost:8082
    depends_on:
      - auth-service
      - transaction-service
    ports:
      - "3000:3000"

volumes:
  mysql-data:
  postgres-data:
