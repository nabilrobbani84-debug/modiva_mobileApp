name: FinTech Core API

on:
  push:
    paths:
      - "fintech-core-api/**"
      - ".github/workflows/fintech-core-api.yml"
  pull_request:
    paths:
      - "fintech-core-api/**"
      - ".github/workflows/fintech-core-api.yml"

permissions:
  contents: read
  packages: write

jobs:
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fintech-core-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: fintech-core-api/go.mod
          cache-dependency-path: fintech-core-api/go.sum
      - run: go test ./...

  dashboard-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fintech-core-api/apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fintech-core-api/apps/dashboard/package-lock.json
      - run: npm install
      - run: npm run typecheck
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [go-test, dashboard-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build service images
        working-directory: fintech-core-api
        run: |
          docker build -f services/auth/Dockerfile -t fintech-auth-service:${{ github.sha }} .
          docker build -f services/transaction/Dockerfile -t fintech-transaction-service:${{ github.sha }} .
          docker build -f apps/dashboard/Dockerfile -t fintech-dashboard:${{ github.sha }} apps/dashboard

  deploy:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deployment hook
        run: |
          echo "Replace this step with Cloud Run, ECS, Kubernetes, or SSH deployment commands."
          echo "Commit ${{ github.sha }} passed tests and image builds."
