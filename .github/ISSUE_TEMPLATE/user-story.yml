name: User Story
description: Tambahkan backlog item Scrum dalam bentuk user story
title: "[Story] "
labels:
  - backlog
  - story
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      description: Tulis dengan format Sebagai, saya ingin, sehingga.
      placeholder: Sebagai siswa, saya ingin ..., sehingga ...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Tulis kriteria yang bisa diuji.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: dropdown
    id: status
    attributes:
      label: Initial Status
      options:
        - Todo
        - In Progress
        - Blocked
        - Review
        - Done
    validations:
      required: true
  - type: input
    id: estimate
    attributes:
      label: Story Point Estimate
      placeholder: "3"
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / Risks
      placeholder: Environment, data uji, backend, APK, stakeholder, atau risiko utama.
  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: Dependency, risiko, atau catatan refinement.
