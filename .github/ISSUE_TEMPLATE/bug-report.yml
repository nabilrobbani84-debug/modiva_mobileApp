name: Bug Report
description: Laporkan defect yang ditemukan selama sprint
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Ringkasan Bug
      placeholder: Jelaskan bug secara singkat.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Result
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - Major
        - Minor
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: Device, APK version, backend URL, database config, dll.
